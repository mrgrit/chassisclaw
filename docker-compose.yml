services:
  core:
    build: ./core
    container_name: csclaw-core
    environment:
      DATA_ROOT: /data
    volumes:
      - ./data:/data
      - ./core:/app
      - ./skills:/app/skills
    depends_on:
      - subagent
    ports:
      - "${API_PORT:-8000}:8000"

  subagent-1:
    build: .
    container_name: chassisclaw-subagent-1
    command: ["python", "-m", "app.subagent"]
    environment:
      CHASSISCLAW_AGENT_ID: local-agent-1
      SUBAGENT_PORT: "55123"
    expose:
      - "55123"

  subagent-2:
    build: .
    container_name: chassisclaw-subagent-2
    command: ["python", "-m", "app.subagent"]
    environment:
      CHASSISCLAW_AGENT_ID: local-agent-2
      SUBAGENT_PORT: "55123"
    expose:
      - "55123"

  engine:
    image: python:3.12-slim
    container_name: csclaw-engine
    command: ["python", "-m", "http.server", "9000"]
    ports:
      - "9000:9000"
