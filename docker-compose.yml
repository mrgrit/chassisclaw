services:
  core:
    build: ./core
    container_name: csclaw-core
    environment:
      DATA_ROOT: /data
    volumes:
      - ./data:/data
      - ./core:/app
      - ./skills:/app/skills
    depends_on:
      - subagent
    ports:
      - "${API_PORT:-8000}:8000"

  subagent:
    build: ./subagent
    container_name: csclaw-subagent
    environment:
      AGENT_ID: local-agent-1
      EVIDENCE_DIR: /data/evidence
      MAX_OUTPUT_BYTES: "200000"
    volumes:
      - ./data:/data
    ports:
      - "${SUBAGENT_PORT:-55123}:55123"

  engine:
    image: python:3.12-slim
    container_name: csclaw-engine
    command: ["python", "-m", "http.server", "9000"]
    ports:
      - "9000:9000"
